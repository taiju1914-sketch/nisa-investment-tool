name: Update Price Data

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 月〜金 UTC 01:00（日本時間10:00）
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch prices
        run: |
          python3 << 'EOF'
          import urllib.request, json, sys
          from datetime import datetime

          def fetch_yahoo(symbol):
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{symbol}?range=1y&interval=1d"
              req = urllib.request.Request(url, headers={
                  "User-Agent": "Mozilla/5.0",
                  "Accept": "application/json"
              })
              with urllib.request.urlopen(req, timeout=30) as r:
                  data = json.loads(r.read().decode("utf-8"))
              result = data["chart"]["result"][0]
              current = result["meta"]["regularMarketPrice"]
              closes = [v for v in result["indicators"]["quote"][0]["close"] if v]
              high52 = max(closes)
              drop = (high52 - current) / high52 * 100
              return {"current": round(current, 2), "high52": round(high52, 2), "dropPct": round(drop, 4)}

          def fetch_yahoo2(symbol):
              url = f"https://query2.finance.yahoo.com/v8/finance/chart/{symbol}?range=1y&interval=1d"
              req = urllib.request.Request(url, headers={
                  "User-Agent": "Mozilla/5.0",
                  "Accept": "application/json"
              })
              with urllib.request.urlopen(req, timeout=30) as r:
                  data = json.loads(r.read().decode("utf-8"))
              result = data["chart"]["result"][0]
              current = result["meta"]["regularMarketPrice"]
              closes = [v for v in result["indicators"]["quote"][0]["close"] if v]
              high52 = max(closes)
              drop = (high52 - current) / high52 * 100
              return {"current": round(current, 2), "high52": round(high52, 2), "dropPct": round(drop, 4)}

          result = {}
          for sym in ["VT", "VOO"]:
              for fetch_fn in [fetch_yahoo, fetch_yahoo2]:
                  try:
                      result[sym] = fetch_fn(sym)
                      print(f"{sym}: {result[sym]}")
                      break
                  except Exception as e:
                      print(f"ERROR {sym} ({fetch_fn.__name__}): {e}", file=sys.stderr)

          result["updatedAt"] = datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          with open("prices.json", "w") as f:
              json.dump(result, f, indent=2)
          print("Saved prices.json")

          if "VT" not in result or "VOO" not in result:
              print("ERROR: 一部データ取得失敗", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Commit and push
        run: |
          git config user.email "noreply@anthropic.com"
          git config user.name "Claude"
          git add prices.json
          git diff --staged --quiet || git commit -m "Update price data $(date -u +%Y-%m-%d)"
          git push
